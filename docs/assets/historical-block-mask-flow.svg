<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Historical block boundary blending flow</title>
  <desc id="description">Blurred and noisy image pairs are partitioned into overlapping blocks, boundary-conditioned, restored with regional point spread functions, weighted by separable two-dimensional masks, and normalized into a seamless output.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101923"/>
      <stop offset="1" stop-color="#0b1118"/>
    </linearGradient>
    <linearGradient id="maskRamp" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#111820"/>
      <stop offset=".28" stop-color="#111820"/>
      <stop offset=".82" stop-color="#68d6a5"/>
      <stop offset="1" stop-color="#edf3fa"/>
    </linearGradient>
    <radialGradient id="maskCorner" cx="100%" cy="100%" r="110%">
      <stop offset="0" stop-color="#edf3fa"/>
      <stop offset=".55" stop-color="#68d6a5"/>
      <stop offset="1" stop-color="#111820"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#8eb9ff" stroke-width="1" opacity=".55"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#8eb9ff"/>
    </marker>
    <style>
      .title { fill: #edf3fa; font: 700 38px Inter, system-ui, sans-serif; }
      .subtitle { fill: #9fb0c4; font: 20px Inter, system-ui, sans-serif; }
      .stage { fill: #172330; stroke: #344a60; stroke-width: 2; }
      .stage-title { fill: #edf3fa; font: 700 24px Inter, system-ui, sans-serif; }
      .body { fill: #c4d0dd; font: 17px Inter, system-ui, sans-serif; }
      .small { fill: #a9b7c8; font: 14px Inter, system-ui, sans-serif; }
      .formula { fill: #68d6a5; font: 700 18px ui-monospace, SFMono-Regular, monospace; }
      .number { fill: #0d141c; font: 800 20px Inter, system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .arrow { fill: none; stroke: #8eb9ff; stroke-width: 5; marker-end: url(#arrow); }
      .dashed { fill: #101820; stroke: #536a80; stroke-width: 2; stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#background)"/>
  <text class="title" x="55" y="68">Historical block-boundary restoration flow</text>
  <text class="subtitle" x="55" y="102">2010-2011 record: PSF-aware boundary conditioning, separable 2D masks, and normalized overlap-add</text>

  <rect class="stage" x="50" y="145" width="300" height="260" rx="20"/>
  <circle cx="82" cy="177" r="20" fill="#8eb9ff"/><text class="number" x="82" y="177">1</text>
  <text class="stage-title" x="115" y="185">Capture pair and PSFs</text>
  <rect x="78" y="222" width="105" height="90" rx="8" fill="#57677a"/>
  <path d="M82 294 L110 250 L136 276 L158 238 L180 294 Z" fill="#c5d0dc" opacity=".8"/>
  <text class="small" x="93" y="335">blurred</text>
  <rect x="215" y="222" width="105" height="90" rx="8" fill="#8997a6"/>
  <circle cx="239" cy="246" r="3" fill="#283746"/><circle cx="263" cy="268" r="2" fill="#283746"/>
  <circle cx="292" cy="242" r="2" fill="#283746"/><circle cx="303" cy="292" r="3" fill="#283746"/>
  <text class="small" x="242" y="335">noisy</text>
  <rect class="dashed" x="78" y="352" width="242" height="35" rx="8"/>
  <text class="small" x="94" y="375">optional: K = Kmotion * Klens</text>

  <path class="arrow" d="M350 275 H405"/>
  <rect class="stage" x="420" y="145" width="300" height="260" rx="20"/>
  <circle cx="452" cy="177" r="20" fill="#8eb9ff"/><text class="number" x="452" y="177">2</text>
  <text class="stage-title" x="485" y="185">Overlapping blocks</text>
  <rect x="458" y="220" width="160" height="140" fill="url(#grid)" stroke="#8eb9ff" stroke-width="2"/>
  <rect x="548" y="276" width="132" height="94" fill="none" stroke="#68d6a5" stroke-width="5"/>
  <rect x="518" y="246" width="132" height="94" fill="#68d6a5" opacity=".12" stroke="#68d6a5" stroke-width="3"/>
  <text class="body" x="462" y="388">256 or 512 px FFT blocks</text>
  <text class="formula" x="462" y="414">overlap ~= 2-3 x PSF width</text>

  <path class="arrow" d="M720 275 H775"/>
  <rect class="stage" x="790" y="145" width="330" height="260" rx="20"/>
  <circle cx="822" cy="177" r="20" fill="#8eb9ff"/><text class="number" x="822" y="177">3</text>
  <text class="stage-title" x="855" y="185">Periodic boundary conditioning</text>
  <rect x="830" y="222" width="105" height="115" rx="6" fill="#263644" stroke="#a7b5c4"/>
  <path d="M834 329 L857 287 L878 305 L902 255 L931 319" fill="none" stroke="#e6eef7" stroke-width="4"/>
  <path d="M835 248 L856 276 L878 305" fill="none" stroke="#68d6a5" stroke-width="5"/>
  <path d="M902 255 L930 248" fill="none" stroke="#68d6a5" stroke-width="5"/>
  <path d="M967 326 L967 246 M967 326 L1067 326" stroke="#71869a" stroke-width="2"/>
  <path d="M967 316 L987 316 L1048 254 L1067 254" fill="none" stroke="#68d6a5" stroke-width="5"/>
  <rect x="967" y="246" width="19" height="80" fill="#0d141c" opacity=".7"/>
  <text class="small" x="965" y="350">dead zone</text>
  <text class="body" x="830" y="380">Interpolate edge band for FFT periodicity</text>
  <text class="formula" x="830" y="408">dead zone = PSF half-width</text>

  <path class="arrow" d="M1120 275 H1175"/>
  <rect class="stage" x="1190" y="145" width="360" height="260" rx="20"/>
  <circle cx="1222" cy="177" r="20" fill="#8eb9ff"/><text class="number" x="1222" y="177">4</text>
  <text class="stage-title" x="1255" y="185">Regional restoration</text>
  <rect x="1230" y="224" width="92" height="92" rx="8" fill="#293b4c"/>
  <path d="M1243 293 C1260 245 1287 299 1309 247" fill="none" stroke="#8eb9ff" stroke-width="7"/>
  <text class="small" x="1234" y="337">regional PSF</text>
  <text class="formula" x="1340" y="266">FFT</text>
  <path class="arrow" d="M1325 270 H1410"/>
  <rect x="1420" y="224" width="92" height="92" rx="8" fill="#647486"/>
  <path d="M1425 301 L1454 250 L1473 278 L1505 238" fill="none" stroke="#edf3fa" stroke-width="5"/>
  <text class="small" x="1408" y="337">restored block</text>
  <text class="body" x="1230" y="374">Tikhonov PSF + L1 / hyper-Laplacian</text>
  <text class="small" x="1230" y="401">One restored patch per block position</text>

  <path class="arrow" d="M1370 405 V472"/>
  <rect class="stage" x="1140" y="490" width="410" height="305" rx="20"/>
  <circle cx="1172" cy="522" r="20" fill="#8eb9ff"/><text class="number" x="1172" y="522">5</text>
  <text class="stage-title" x="1205" y="530">Separable 2D mask construction</text>
  <rect x="1180" y="565" width="130" height="84" rx="6" fill="url(#maskRamp)" stroke="#536a80"/>
  <path d="M1192 635 H1296 M1192 635 V578" stroke="#dbe7f3" stroke-width="2"/>
  <text class="small" x="1190" y="672">mL(x), mR = 1 - mL</text>
  <text class="formula" x="1332" y="612">x</text>
  <rect x="1370" y="552" width="130" height="130" rx="8" fill="url(#maskCorner)" stroke="#68d6a5" stroke-width="2"/>
  <text class="formula" x="1180" y="724">MTL(x,y) = mL(x) * mU(y)</text>
  <text class="small" x="1180" y="756">1D ramps multiply into corner masks</text>

  <path class="arrow" d="M1140 642 H1082"/>
  <rect class="stage" x="635" y="490" width="430" height="305" rx="20"/>
  <circle cx="667" cy="522" r="20" fill="#8eb9ff"/><text class="number" x="667" y="522">6</text>
  <text class="stage-title" x="700" y="530">Nine position masks</text>
  <g transform="translate(680 565)">
    <rect width="180" height="180" fill="#101820" stroke="#8eb9ff" stroke-width="2"/>
    <path d="M60 0 V180 M120 0 V180 M0 60 H180 M0 120 H180" stroke="#536a80" stroke-width="2"/>
    <rect x="62" y="62" width="56" height="56" fill="#edf3fa"/>
    <text class="small" x="15" y="35">TL</text><text class="small" x="80" y="35">T</text><text class="small" x="140" y="35">TR</text>
    <text class="small" x="16" y="96">L</text><text class="small" x="80" y="96" fill="#101820">C</text><text class="small" x="142" y="96">R</text>
    <text class="small" x="12" y="157">BL</text><text class="small" x="80" y="157">B</text><text class="small" x="138" y="157">BR</text>
  </g>
  <text class="body" x="885" y="586">4 corners</text>
  <text class="body" x="885" y="622">4 edges</text>
  <text class="body" x="885" y="658">1 interior</text>
  <text class="small" x="885" y="702">Dead zones suppress</text>
  <text class="small" x="885" y="726">interpolated boundary pixels</text>
  <text class="formula" x="680" y="775">sum masks at overlap = 1</text>

  <path class="arrow" d="M635 642 H577"/>
  <rect class="stage" x="50" y="490" width="510" height="305" rx="20"/>
  <circle cx="82" cy="522" r="20" fill="#8eb9ff"/><text class="number" x="82" y="522">7</text>
  <text class="stage-title" x="115" y="530">Normalized overlap-add</text>
  <text class="formula" x="92" y="593">Xhat = sum_b Mb * Xb / sum_b Mb</text>
  <text class="formula" x="92" y="632">sum_b Mb(x,y) = 1</text>
  <rect x="92" y="668" width="190" height="90" rx="8" fill="#425568"/>
  <path d="M98 746 L136 700 L178 730 L218 683 L276 742" fill="none" stroke="#edf3fa" stroke-width="5"/>
  <rect x="315" y="668" width="190" height="90" rx="8" fill="#263846"/>
  <path d="M322 745 L360 700 L402 730 L442 683 L498 742" fill="none" stroke="#68d6a5" stroke-width="5"/>
  <path d="M286 713 H308" stroke="#8eb9ff" stroke-width="5" marker-end="url(#arrow)"/>
  <text class="small" x="92" y="779">weighted patches</text>
  <text class="small" x="362" y="779">seam-free full image</text>

  <text class="small" x="55" y="855">Documented in the 2011 IPIU poster and presentation; preserved C++ records 4 corner + 4 edge + 1 interior masks.</text>
  <text class="small" x="55" y="880">The 2013 journal moves from fixed blocks to disparity-defined regions; the 2026 reconstruction uses normalized feather blending.</text>
</svg>
