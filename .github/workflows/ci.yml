name: CI

on:
  push:
  pull_request:

jobs:
  test-build-showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run python -m unittest discover -s tests -v
      - run: uv build
      - name: Public showcase smoke
        run: |
          uv run disparity-deblur-benchmark \
            --manifest benchmarks/manifests/public.json \
            --dataset-root benchmarks/public-assets \
            --output-dir "$RUNNER_TEMP/showcase" \
            --hpo-max-dimension 64 \
            --output-max-dimension 64
          test -f "$RUNNER_TEMP/showcase/benchmark.json"
          uv run python -c 'import json, sys; assert [dataset["id"] for dataset in json.load(open(sys.argv[1], encoding="utf-8"))["datasets"]] == ["gopro-flower", "01_df2_object_motion", "02_building_low_light", "05_new1_parking"]' "$RUNNER_TEMP/showcase/benchmark.json"
